<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leihrad System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: auto;
}

h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

.button {
    display: block;
    background: #007bff;
    color: white;
    text-decoration: none;
    padding: 18px;
    margin: 15px 0;
    border-radius: 12px;
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Fahrrad</h1>

<a class="button" id="handover">🚲 Übergabe</a>
<a class="button" id="return">🔄 Rückgabe</a>

</div>

<script>
// URL Parameter
const params = new URLSearchParams(window.location.search);

const bikeId = params.get("id") || "";
const model = params.get("model") || "";

// aktuelle Zeit
const now = new Date();
const dateTime =
now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

// Titel
document.getElementById("title").innerText =
"Fahrrad " + bikeId + " (" + model + ")";

// 👉 HIER deine Airtable Formulare einsetzen
const FORM_HANDOVER = "";
const FORM_RETURN = "https://airtable.com/appJmDxyE9zDO3r8h/pagwy3fhw2p9Uj7Pt/form?prefill_BikeID=1%20&prefill_Modell=Amflow%20PL%20Carbon%20&prefill_R%C3%BCckgabezeitpunkt=today%20&prefill_Aktion=R%C3%BCckgabe";

// URL Builder
function buildUrl(base, action){
    return base +
    "?prefill_BikeID=" + encodeURIComponent(bikeId) +
    "&prefill_Modell=" + encodeURIComponent(model) +
    "&prefill_Rückgabezeitpunkt=" + encodeURIComponent(dateTime) +
    "&prefill_Aktion=" + encodeURIComponent(action);
}

// Buttons setzen
document.getElementById("handover").href =
buildUrl(FORM_HANDOVER, "Übergabe");

document.getElementById("return").href =
buildUrl(FORM_RETURN, "Rückgabe");

</script>

</body>
</html>
