<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leihrad System</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    text-align:center;
}

.container{
    max-width:400px;
    margin:auto;
}

h1{
    margin-bottom:25px;
}

.button{
    display:block;
    background:#007bff;
    color:white;
    text-decoration:none;
    padding:18px;
    margin:15px 0;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
}

.button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="container">

<h1 id="title">Fahrrad</h1>

<a class="button" id="handover" href="#">
🚲 Übergabe
</a>

<a class="button" id="return" href="#">
🔄 Rückgabe
</a>

</div>

<script>

// URL Parameter auslesen
const params = new URLSearchParams(window.location.search);

// Werte aus QR-Code holen
const bikeId = params.get("id") || 
const model = params.get("model") || 

// Titel anzeigen
document.getElementById("title").innerText =
"Fahrrad " + bikeId + " (" + model + ")";

// 🔧 HIER DEINE AIRTABLE FORMULAR LINKS EINTRAGEN
const FORM_HANDOVER =
"https://airtable.com/appJmDxyE9zDO3r8h/pag74Pw3OOO0loIdb/form";

const FORM_RETURN =
"https://airtable.com/appJmDxyE9zDO3r8h/pagwy3fhw2p9Uj7Pt/form";

// Aktuelles Datum + Uhrzeit erzeugen
const now = new Date();

const dateTime =
now.getFullYear() + "-" +
String(now.getMonth()+1).padStart(2,"0") + "-" +
String(now.getDate()).padStart(2,"0") + " " +
String(now.getHours()).padStart(2,"0") + ":" +
String(now.getMinutes()).padStart(2,"0");

// 🚲 Übergabe URL
const handoverUrl =
FORM_HANDOVER +
"?prefill_Bike-ID=" + encodeURIComponent(bikeId) +
"&prefill_Fahrrad=" + encodeURIComponent(model) +
"&prefill_Übergabezeitpunkt=" + encodeURIComponent(dateTime) +
"&prefill_Status=" + encodeURIComponent("ausgeliehen") +
"&prefill_Datum=" + encodeURIComponent(dateTime);

// 🔄 Rückgabe URL
const returnUrl =
FORM_RETURN +
"?prefill_Bike-ID=" + encodeURIComponent(bikeId) +
"&prefill_Fahrrad=" + encodeURIComponent(model) +
"&prefill_Rückgabezeitpunkt=" + encodeURIComponent(dateTime) +
"&prefill_Status=" + encodeURIComponent("zurueckgegeben") +
"&prefill_Datum=" + encodeURIComponent(dateTime);

// Buttons mit Links befüllen
document.getElementById("handover").href = handoverUrl;
document.getElementById("return").href = returnUrl;

</script>

</body>
</html>
